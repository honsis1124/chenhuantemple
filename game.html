<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸運扭蛋機 - 序號抽獎</title>
    <style>
        :root {
            --primary-red: #ef233c;
            --dark-blue: #2b2d42;
            --gold: #ffbe0b;
        }

        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background: #fdf0d5; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }
        
        /* 跑馬燈 */
        .marquee-container { 
            width: 100%; 
            max-width: 400px; 
            background: var(--dark-blue); 
            color: var(--gold); 
            padding: 10px; 
            border-radius: 25px; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* 扭蛋機置中容器 */
        .machine-container {
            width: 100%;
            display: flex;
            justify-content: center;
            position: relative;
            margin-bottom: 50px;
        }

        /* 扭蛋機主體 - 這裡不負責置中，只負責動畫 */
        .gacha-machine { 
            width: 260px; 
            height: 360px; 
            position: relative; 
        }

        /* 修正後的晃動動畫：不再位移 */
        @keyframes shakeAnim {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            50% { transform: rotate(-2deg); }
            75% { transform: rotate(1deg); }
            100% { transform: rotate(0deg); }
        }
        .shake { animation: shakeAnim 0.2s infinite; }

        .machine-top { 
            width: 180px; height: 180px; 
            background: rgba(255, 255, 255, 0.6); 
            border: 6px solid #444; 
            border-radius: 50%; 
            position: absolute; top: 0; left: 40px; 
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center; 
            overflow: hidden; z-index: 2; 
        }

        .machine-bottom { 
            width: 200px; height: 160px; 
            background: var(--primary-red); 
            border: 6px solid #444; 
            border-radius: 20px; 
            position: absolute; bottom: 10px; left: 30px; 
            z-index: 1; 
        }

        .knob { 
            width: 50px; height: 50px; 
            background: #fff; border: 4px solid #444; border-radius: 50%; 
            position: absolute; top: 30px; left: 75px; 
            cursor: pointer; transition: transform 0.5s; z-index: 3; 
        }
        .knob::after { content: ""; width: 30px; height: 6px; background: #444; position: absolute; top: 22px; left: 10px; border-radius: 3px; }
        .spin { transform: rotate(360deg) !important; }

        .exit { 
            width: 60px; height: 35px; 
            background: #333; border-radius: 10px 10px 0 0; 
            position: absolute; bottom: 0; left: 70px; 
        }

        /* 掉出來的扭蛋 */
        .out-ball {
            width: 45px; height: 45px; 
            border-radius: 50%; border: 3px solid #333;
            position: absolute; bottom: 0; left: 77px; 
            display: none; z-index: 5;
        }

        @keyframes ballDrop {
            0% { transform: translateY(0); opacity: 1; }
            40% { transform: translateY(60px) scaleY(0.8); }
            60% { transform: translateY(40px) scaleY(1); }
            100% { transform: translateY(55px); opacity: 1; }
        }
        .ball-animation { display: block !important; animation: ballDrop 0.6s ease-out forwards; }

        /* 裝飾球 */
        .ball { width: 30px; height: 30px; border-radius: 50%; margin: 2px; }

        /* 彈窗與列表 */
        #modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); 
            text-align: center; z-index: 10; width: 280px; border: 4px solid var(--primary-red); 
        }
        .history-list { width: 100%; max-width: 400px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        ul { list-style: none; padding: 0; max-height: 150px; overflow-y: auto; text-align: left; }
        li { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        button { background: var(--primary-red); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="marquee-container">
        <marquee id="globalHistory">正在載入抽獎動態...</marquee>
    </div>

    <div id="gameContainer" style="display:none; width: 100%; max-width: 400px;">
        <div class="machine-container">
            <div class="gacha-machine" id="machine">
                <div class="machine-top">
                    <div class="ball" style="background:#ff4d6d"></div><div class="ball" style="background:#48cae4"></div>
                    <div class="ball" style="background:#ffbe0b"></div><div class="ball" style="background:#70e000"></div>
                </div>
                <div class="machine-bottom">
                    <div class="knob" id="knob" onclick="handleDraw()"></div>
                    <div class="exit"></div>
                    <div id="outBall" class="out-ball"></div>
                </div>
            </div>
        </div>

        <div class="history-list">
            <h3>🎁 我的中獎紀錄</h3>
            <ul id="myHistory"><li>尚未有紀錄</li></ul>
        </div>
    </div>

    <div id="modal">
        <h2>🎉 恭喜中獎！</h2>
        <div id="pName" style="font-size:20px; font-weight:bold; color:#ef233c; margin:10px;"></div>
        <div id="pCode" style="background:#f0f0f0; padding:10px; border-radius:5px; font-family:monospace; margin-bottom:15px;"></div>
        <button onclick="closeModal()">收下獎項</button>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbxXiUgwhFPJA1w7k_5Yix5M6gPSFM4vlGLHrwFiYX6S6XbH5PnDrvYHBkcZtqDlF_4/exec"; 
        const currentUser = sessionStorage.getItem('username');
        let isSpinning = false;

        if (!sessionStorage.getItem('loginToken') || !currentUser) {
            alert("請先登入！");
            window.location.href = 'index.html';
        } else {
            document.getElementById('gameContainer').style.display = 'block';
            initData();
        }

        async function initData() {
            updateGlobalHistory();
            updateMyHistory();
        }

        async function handleDraw() {
            if (isSpinning) return;
            isSpinning = true;

            const knob = document.getElementById('knob');
            const machine = document.getElementById('machine');
            const outBall = document.getElementById('outBall');
            
            knob.classList.add('spin');
            machine.classList.add('shake');
            outBall.classList.remove('ball-animation');

            try {
                // 執行 GAS 抽獎 API
                const res = await fetch(`${gasUrl}?action=draw&username=${encodeURIComponent(currentUser)}`);
                const data = await res.json();

                // 為了讓動畫有感覺，延遲 1.5 秒再停止晃動
                setTimeout(() => {
                    machine.classList.remove('shake');
                    knob.classList.remove('spin');

                    if (data.success) {
                        const colors = ["#ff4d6d", "#48cae4", "#ffbe0b", "#70e000"];
                        outBall.style.background = colors[Math.floor(Math.random() * colors.length)];
                        outBall.classList.add('ball-animation');

                        setTimeout(() => {
                            showModal(data.prizeName, data.prizeCode);
                            initData();
                            isSpinning = false;
                        }, 700);
                    } else {
                        alert(data.msg || "序號已抽完！");
                        isSpinning = false;
                    }
                }, 1500);
            } catch (e) {
                alert("連線失敗，請檢查網路");
                machine.classList.remove('shake');
                knob.classList.remove('spin');
                isSpinning = false;
            }
        }

        async function updateGlobalHistory() {
            try {
                const res = await fetch(`${gasUrl}?action=getLogs`);
                const data = await res.json();
                const text = data.history.length > 0 
                    ? data.history.map(h => `恭喜 [${h.user}] 抽中 ${h.prize}`).join(" 🌟 ")
                    : "快來成為第一個中獎者吧！";
                document.getElementById('globalHistory').innerText = text;
            } catch (e) {}
        }

        async function updateMyHistory() {
            try {
                const res = await fetch(`${gasUrl}?action=getLogs`);
                const data = await res.json();
                const myLogs = data.history.filter(h => h.user === currentUser);
                const list = document.getElementById('myHistory');
                if (myLogs.length > 0) {
                    list.innerHTML = myLogs.map(h => `<li>🎁 ${h.prize}<br><small style="color:#666">序號: ${h.code}</small></li>`).join("");
                }
            } catch (e) {}
        }

        function showModal(name, code) {
            document.getElementById('pName').innerText = name;
            document.getElementById('pCode').innerText = code;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('outBall').classList.remove('ball-animation');
        }

        setInterval(updateGlobalHistory, 60000);
    </script>
</body>
</html>
