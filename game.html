<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸運扭蛋機 - 序號抽獎</title>
    <style>
        :root { --primary-red: #ef233c; --dark-blue: #2b2d42; --gold: #ffbe0b; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #fdf0d5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .marquee-container { width: 100%; max-width: 400px; background: var(--dark-blue); color: var(--gold); padding: 10px; border-radius: 25px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        /* 剩餘次數顯示 */
        .chance-tag { background: white; padding: 5px 15px; border-radius: 15px; border: 2px solid var(--primary-red); color: var(--primary-red); font-weight: bold; margin-bottom: 10px; font-size: 16px; }

        .machine-container { width: 100%; display: flex; justify-content: center; position: relative; margin-bottom: 50px; }
        .gacha-machine { width: 260px; height: 360px; position: relative; }

        @keyframes shakeAnim { 0% { transform: rotate(0deg); } 25% { transform: rotate(2deg); } 50% { transform: rotate(-2deg); } 100% { transform: rotate(0deg); } }
        .shake { animation: shakeAnim 0.2s infinite; }

        .machine-top { width: 180px; height: 180px; background: rgba(255, 255, 255, 0.6); border: 6px solid #444; border-radius: 50%; position: absolute; top: 0; left: 40px; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; overflow: hidden; z-index: 2; }
        .machine-bottom { width: 200px; height: 160px; background: var(--primary-red); border: 6px solid #444; border-radius: 20px; position: absolute; bottom: 10px; left: 30px; z-index: 1; }
        .knob { width: 50px; height: 50px; background: #fff; border: 4px solid #444; border-radius: 50%; position: absolute; top: 30px; left: 75px; cursor: pointer; z-index: 3; }
        .knob::after { content: ""; width: 30px; height: 6px; background: #444; position: absolute; top: 22px; left: 10px; border-radius: 3px; }
        .spin { transform: rotate(360deg) !important; transition: transform 0.5s; }
        .exit { width: 60px; height: 35px; background: #333; border-radius: 10px 10px 0 0; position: absolute; bottom: 0; left: 70px; }
        .out-ball { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #333; position: absolute; bottom: 0; left: 77px; display: none; z-index: 5; }

        @keyframes ballDrop { 0% { transform: translateY(0); opacity: 1; } 40% { transform: translateY(60px) scaleY(0.8); } 100% { transform: translateY(55px); opacity: 1; } }
        .ball-animation { display: block !important; animation: ballDrop 0.6s ease-out forwards; }

        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); text-align: center; z-index: 10; width: 280px; border: 4px solid var(--primary-red); }
        .prize-name { font-size: 20px; font-weight: bold; color: var(--primary-red); margin: 10px; }
        .prize-code-box { background: #f0f0f0; padding: 12px; border-radius: 8px; font-family: monospace; margin-bottom: 15px; position: relative; word-break: break-all; }
        .copy-btn { background: #444; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-left: 5px; }
        .main-btn { background: var(--primary-red); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .history-list { width: 100%; max-width: 400px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 20px; }
        ul { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; text-align: left; }
        li { padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="marquee-container">
        <marquee id="globalHistory">正在載入最新動態...</marquee>
    </div>

    <!-- 顯示剩餘次數 -->
    <div class="chance-tag">今日剩餘次數：<span id="remainingCount">計算中...</span></div>

    <div id="gameContainer" style="display:none; width: 100%; max-width: 400px; text-align: center;">
        <div class="machine-container">
            <div class="gacha-machine" id="machine">
                <div class="machine-top">
                    <div style="width:30px; height:30px; background:#ff4d6d; border-radius:50%; margin:2px;"></div>
                    <div style="width:30px; height:30px; background:#48cae4; border-radius:50%; margin:2px;"></div>
                    <div style="width:30px; height:30px; background:#ffbe0b; border-radius:50%; margin:2px;"></div>
                </div>
                <div class="machine-bottom">
                    <div class="knob" id="knob" onclick="handleDraw()"></div>
                    <div class="exit"></div>
                    <div id="outBall" class="out-ball"></div>
                </div>
            </div>
        </div>

        <div class="history-list">
            <h3>🎁 我的中獎紀錄</h3>
            <ul id="myHistory"><li>尚未有紀錄</li></ul>
        </div>
    </div>

    <div id="modal">
        <h2>🎉 恭喜中獎！</h2>
        <div id="pName" class="prize-name"></div>
        <div class="prize-code-box">
            <span id="pCode"></span>
            <button class="copy-btn" id="modalCopyBtn">複製</button>
        </div>
        <button class="main-btn" onclick="closeModal()">確認收下</button>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbyMx0WKSX-ShVgRjCtLW-ONMBiLlp628mAvCdo-QJr0dinHnH4wczl5-gk8HgOT4fY/exec"; 
        const currentUser = sessionStorage.getItem('username');
        let isSpinning = false;

        if (!sessionStorage.getItem('loginToken') || !currentUser) {
            alert("請先登入！");
            window.location.href = 'index.html';
        } else {
            document.getElementById('gameContainer').style.display = 'block';
            initData();
        }

        async function initData() {
            updateGlobalHistory();
            updateMyHistory();
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => { alert("序號已複製成功！"); }).catch(() => {
                const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select();
                document.execCommand('copy'); document.body.removeChild(el); alert("序號已複製成功！");
            });
        }

        // 抽獎邏輯：成功後立即反應次數
        async function handleDraw() {
            if (isSpinning) return;
            const currentRemain = parseInt(document.getElementById('remainingCount').innerText);
            if (currentRemain <= 0) {
                alert("今天次數已用完囉！");
                return;
            }
        
            isSpinning = true;
            const knob = document.getElementById('knob');
            const machine = document.getElementById('machine');
            const outBall = document.getElementById('outBall');
            
            knob.classList.add('spin');
            machine.classList.add('shake');
        
            try {
                const res = await fetch(`${gasUrl}?action=draw&username=${encodeURIComponent(currentUser)}`);
                const data = await res.json();
        
                setTimeout(() => {
                    machine.classList.remove('shake');
                    knob.classList.remove('spin');
        
                    if (data.success) {
                        // [關鍵]：立即更新畫面上的剩餘次數，不用等重新抓取
                        document.getElementById('remainingCount').innerText = currentRemain - 1;
        
                        outBall.style.background = ["#ff4d6d", "#48cae4", "#ffbe0b"][Math.floor(Math.random()*3)];
                        outBall.classList.add('ball-animation');
        
                        setTimeout(() => {
                            showModal(data.prizeName, data.prizeCode);
                            updateMyHistory(); // 同步抓取最新清單
                            isSpinning = false;
                        }, 700);
                    } else {
                        alert(data.msg);
                        isSpinning = false;
                        updateMyHistory(); // 重新整理次數
                    }
                }, 1500);
            } catch (e) {
                alert("連線失敗");
                machine.classList.remove('shake'); knob.classList.remove('spin'); isSpinning = false;
            }
        }

        async function updateGlobalHistory() {
            try {
                const res = await fetch(`${gasUrl}?action=getLogs`);
                const data = await res.json();
                const text = data.history.length > 0 
                    ? data.history.map(h => `恭喜 [${h.user}] 抽中 ${h.prize}`).join("  🌟  ")
                    : "快來抽獎吧！";
                document.getElementById('globalHistory').innerText = text;
            } catch (e) {}
        }

        // 更新紀錄與次數：加強時間判定
        async function updateMyHistory() {
            try {
                const res = await fetch(`${gasUrl}?action=getLogs&t=${new Date().getTime()}`); // 加 t 避免瀏覽器快取
                const data = await res.json();
                
                const now = new Date();
                let resetTime = new Date();
                resetTime.setHours(10, 0, 0, 0);
                if (now < resetTime) resetTime.setDate(resetTime.getDate() - 1);
                
                // 篩選今日紀錄
                const todayLogs = data.history.filter(h => {
                    return h.user === currentUser && new Date(h.time) >= resetTime;
                });
                
                // 更新剩餘次數
                document.getElementById('remainingCount').innerText = Math.max(0, 3 - todayLogs.length);
        
                // 更新清單
                const myLogs = data.history.filter(h => h.user === currentUser);
                const list = document.getElementById('myHistory');
                if (myLogs.length > 0) {
                    list.innerHTML = myLogs.map(h => `
                        <li>
                            <b>${h.prize}</b> 
                            <button class="copy-btn" onclick="copyToClipboard('${h.code}')">複製</button><br>
                            <small style="color:#666">${h.code}</small>
                        </li>
                    `).join("");
                }
            } catch (e) { console.error(e); }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('outBall').style.display = 'none';
        }

        setInterval(updateGlobalHistory, 60000);
    </script>
</body>
</html>
