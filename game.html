<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晨皇廟咖啡扭蛋機</title>

<style>
:root {
    --primary-red: #ef233c;
    --dark-blue: #2b2d42;
    --gold: #ffbe0b;
}

body { 
    font-family: 'Microsoft JhengHei', sans-serif; 
    background: #fdf0d5; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    margin: 0; 
    padding: 20px; 
}

.marquee-container { 
    width: 100%; 
    max-width: 400px; 
    background: var(--dark-blue); 
    color: var(--gold); 
    padding: 10px; 
    border-radius: 25px; 
    margin-bottom: 20px; 
}

.machine-container { display:flex; justify-content:center; margin-bottom:20px; }

.gacha-machine { width:260px; height:360px; position:relative; }

.machine-top {
    width:180px; height:180px;
    background:rgba(255,255,255,0.6);
    border:6px solid #444;
    border-radius:50%;
    position:absolute; top:0; left:40px;
}

.machine-bottom {
    width:200px; height:160px;
    background:var(--primary-red);
    border:6px solid #444;
    border-radius:20px;
    position:absolute; bottom:10px; left:30px;
}

.knob {
    width:50px; height:50px;
    background:#fff;
    border:4px solid #444;
    border-radius:50%;
    position:absolute; top:30px; left:75px;
    cursor:pointer;
}

.exit { width:60px; height:35px; background:#333; position:absolute; bottom:0; left:70px; }
.out-ball { width:45px; height:45px; border-radius:50%; position:absolute; bottom:0; left:77px; display:none; }

.spin { transform: rotate(360deg); transition:0.5s; }

@keyframes shake {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(2deg); }
    100% { transform: rotate(0deg); }
}
.shake { animation: shake 0.2s infinite; }

.ball-animation {
    display:block !important;
    animation: drop 0.6s ease-out forwards;
}
@keyframes drop {
    0% { transform:translateY(0); }
    100% { transform:translateY(55px); }
}

#modal {
    display:none;
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:#fff;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.history-list {
    width:100%;
    max-width:400px;
    background:#fff;
    padding:15px;
    border-radius:10px;
}

.main-btn {
    background:var(--primary-red);
    color:#fff;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.copy-btn {
    margin-left:5px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="marquee-container">
<marquee id="globalHistory">載入中...</marquee>
</div>

<p id="remainingText"></p>

<div id="gameContainer">

<div class="machine-container">
<div class="gacha-machine" id="machine">

<div class="machine-top"></div>

<div class="machine-bottom">
<div class="knob" id="knob" onclick="handleDraw()"></div>
<div class="exit"></div>
<div id="outBall" class="out-ball"></div>
</div>

</div>
</div>

<div class="history-list">
<h3>🎁 我的紀錄</h3>
<ul id="myHistory"></ul>
</div>

</div>

<div id="modal">
<h2>🎉 恭喜中獎</h2>
<div id="pName"></div>
<div>
<span id="pCode"></span>
<button class="copy-btn" id="copyBtn">複製</button>
</div>
<button class="main-btn" onclick="closeModal()">關閉</button>
</div>

<script>
const gasUrl = "https://script.google.com/macros/s/AKfycbzP_Tw5uxmeOU4aEwHEs70FKYi7bxlvWB5SugrYoD0QXGEM4Kg4Bswky_lrMKDMdAs/exec";
const currentUser = sessionStorage.getItem('username');

let isSpinning = false;

if (!currentUser) {
    alert("請先登入");
    location.href = "index.html";
}

init();

async function init(){
    updateGlobalHistory();
    updateMyHistory();
}

function copy(text){
    navigator.clipboard.writeText(text);
    alert("已複製");
}

async function handleDraw(){

    if (isSpinning) return;
    isSpinning = true;

    const knob = document.getElementById('knob');
    const machine = document.getElementById('machine');
    const ball = document.getElementById('outBall');

    knob.classList.add('spin');
    machine.classList.add('shake');

    try {

        const res = await fetch(`${gasUrl}?action=draw&username=${currentUser}`);
        const data = await res.json();

        setTimeout(()=>{

            knob.classList.remove('spin');
            machine.classList.remove('shake');

            // ❗ 次數用完
            if (!data.success) {
                alert(data.msg);
                isSpinning = false;
                return;
            }

            ball.style.display = "block";
            ball.classList.add('ball-animation');

            setTimeout(()=>{

                // ⭐ 中獎
                if (data.isWin) {

                    document.getElementById('pName').innerText = data.prizeName;
                    document.getElementById('pCode').innerText = data.prizeCode;

                    document.getElementById('copyBtn').onclick =
                        ()=>copy(data.prizeCode);

                    document.getElementById('modal').style.display = 'block';

                } else {
                    // ❌ 銘謝惠顧
                    alert("😢 銘謝惠顧，再試一次！");
                }

                // ⭐ 剩餘次數
                document.getElementById('remainingText').innerText =
                    `今日剩餘次數：${data.remaining}`;

                updateGlobalHistory();
                updateMyHistory();

                isSpinning = false;

            },700);

        },1200);

    } catch(e){
        alert("連線失敗");
        isSpinning = false;
    }
}

function closeModal(){
    document.getElementById('modal').style.display='none';
}

async function updateGlobalHistory(){
    const res = await fetch(`${gasUrl}?action=getLogs`);
    const data = await res.json();

    const text = data.history.map(h=>`[${h.user}] 抽中 ${h.prize}`).join(" ⭐ ");
    document.getElementById('globalHistory').innerText = text || "快來抽獎吧";
}

async function updateMyHistory(){
    const res = await fetch(`${gasUrl}?action=getLogs`);
    const data = await res.json();

    const my = data.history.filter(h=>h.user===currentUser);

    document.getElementById('myHistory').innerHTML =
        my.map(h=>`<li>${h.prize} <button onclick="copy('${h.code}')">複製</button></li>`).join("");
}

setInterval(updateGlobalHistory,60000);
</script>

</body>
</html>
