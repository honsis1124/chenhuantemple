<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲主頁 - 晨皇廟咖啡</title>
    <style>
        :root { --primary: #ef233c; --dark: #2b2d42; --gold: #ffbe0b; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #fdf0d5; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .marquee-box { width: 100%; max-width: 400px; background: var(--dark); color: var(--gold); padding: 10px; border-radius: 50px; margin-bottom: 20px; text-align: center; overflow: hidden; white-space: nowrap; }
        
        .machine { width: 200px; height: 300px; background: var(--primary); border: 5px solid #333; border-radius: 20px; position: relative; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 10px 0 #b91d2e; }
        .machine:active { transform: translateY(5px); box-shadow: 0 5px 0 #b91d2e; }
        .machine::after { content: "點擊抽獎"; color: white; font-weight: bold; font-size: 20px; }

        .history-section { width: 100%; max-width: 400px; background: white; margin-top: 30px; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h3 { border-left: 5px solid var(--primary); padding-left: 10px; margin-top: 0; }
        ul { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; }
        li { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .prize-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .prize-name {
            font-weight: bold;
            color: var(--dark);
        }
        .prize-code {
            font-size: 13px;
            color: #666;
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        .copy-btn {
            padding: 5px 10px;
            background: #2b2d42;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }
        .copy-btn:active {
            background: #ef233c;
        }
        
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; border: 4px solid var(--primary); z-index: 100; text-align: center; width: 280px; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index: 90; }
    </style>
</head>
<body>

    <div class="marquee-box">
        <marquee id="globalMarquee">載入中...</marquee>
    </div>

    <h2 id="welcomeMsg">您好</h2>

    <div class="machine" onclick="handleDraw()"></div>

    <div class="history-section">
        <h3>🎁 我的獲獎紀錄</h3>
        <ul id="myList"><li>尚未有紀錄</li></ul>
    </div>

    <div class="history-section" style="margin-top: 15px; text-align: center;">
        <button onclick="openChangePassModal()" style="background: none; border: 1px solid #ccc; color: #666; cursor: pointer; padding: 5px 10px; border-radius: 5px;">修改密碼</button>
    </div>
    
    <div class="overlay" id="passOverlay"></div>
    <div id="passModal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; border: 4px solid #333; z-index: 101; width: 280px; text-align: center;">
        <h3>修改密碼</h3>
        <input type="password" id="oldPass" placeholder="請輸入舊密碼" style="width: 90%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">
        <input type="password" id="newPass" placeholder="請輸入新密碼" style="width: 90%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">
        <div style="display: flex; justify-content: space-around; margin-top: 10px;">
            <button onclick="closeChangePassModal()" style="padding: 8px 15px; background: #ccc; border: none; border-radius: 5px; cursor: pointer;">取消</button>
            <button onclick="submitChangePass()" style="padding: 8px 15px; background: #2b2d42; color: white; border: none; border-radius: 5px; cursor: pointer;">確認修改</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="modal">
        <h2 id="pTitle">中獎了！</h2>
        <p id="pName" style="font-size: 20px; color: var(--primary); font-weight: bold;"></p>
        <p id="pCode" style="background: #eee; padding: 10px; word-break: break-all;"></p>
        <button onclick="closeModal()" style="padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer;">收下</button>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbzAF8ZePn-udHt1jC7Lu69VRaGzS2AeCu9eMAElM07Y1hUwD7Jb9hMjMeWVRvj7jsBU/exec";
        const token = sessionStorage.getItem('token');
        const username = sessionStorage.getItem('username');
        const nickname = sessionStorage.getItem('nickname');

        if (!token) { window.location.href = 'index.html'; }
        document.getElementById('welcomeMsg').innerText = `您好，${nickname || username}`;

        async function init() {
            updateMarquee();
            updateMyHistory();
        }

        async function handleDraw() {
            try {
                const res = await fetch(`${gasUrl}?action=draw&token=${encodeURIComponent(token)}`);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('pName').innerText = data.prizeName;
                    document.getElementById('pCode').innerText = (data.prizeCode === "NONE") ? "再接再厲！" : "序號：" + data.prizeCode;
                    document.getElementById('modal').style.display = 'block';
                    document.getElementById('overlay').style.display = 'block';
                    init();
                } else {
                    alert(data.msg);
                }
            } catch (e) { alert("連線失敗"); }
        }

        async function updateMarquee() {
            try {
                const res = await fetch(`${gasUrl}?action=getLogs`);
                const data = await res.json();
                if (data.history) {
                    const text = data.history.map(h => `恭喜 [${h.nickname}] 獲得 ${h.prize}`).join(" 🌟 ");
                    document.getElementById('globalMarquee').innerText = text || "快來當第一個中獎者！";
                }
            } catch (e) {}
        }

        async function updateMyHistory() {
            try {
                const res = await fetch(`${gasUrl}?action=getLogs`);
                const data = await res.json();
                const list = document.getElementById('myList');
                
                // 過濾出自己的紀錄
                const myLogs = data.history.filter(h => h.username === username || h.nickname === nickname);
                
                if (myLogs.length > 0) {
                    list.innerHTML = myLogs.map(h => {
                        // 如果沒有序號或是 NONE，就不顯示複製按鈕
                        const hasCode = h.code && h.code !== "NONE";
                        return `
                            <li class="history-item">
                                <div class="prize-info">
                                    <span class="prize-name">${h.prize}</span>
                                    <span class="prize-code">${hasCode ? h.code : '無序號'}</span>
                                </div>
                                ${hasCode ? `<button class="copy-btn" onclick="copyToClipboard('${h.code}')">複製序號</button>` : ''}
                            </li>
                        `;
                    }).join("");
                } else {
                    list.innerHTML = "<li>尚未有紀錄</li>";
                }
            } catch (e) {
                console.error("讀取紀錄失敗", e);
            }
        }
        
        // --- 新增：複製到剪貼簿的功能 ---
        function copyToClipboard(text) {
            if (!text || text === "NONE") return;
            
            // 使用現代瀏覽器的 API
            navigator.clipboard.writeText(text).then(() => {
                alert("序號已複製到剪貼簿！");
            }).catch(err => {
                // 備用方案：傳統 execCommand 模式
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert("序號已複製！");
                } catch (err) {
                    alert("複製失敗，請手動選取");
                }
                document.body.removeChild(textArea);
            });
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function openChangePassModal() {
            document.getElementById('passModal').style.display = 'block';
            document.getElementById('passOverlay').style.display = 'block';
        }
        
        function closeChangePassModal() {
            document.getElementById('passModal').style.display = 'none';
            document.getElementById('passOverlay').style.display = 'none';
            document.getElementById('oldPass').value = '';
            document.getElementById('newPass').value = '';
        }
        
        async function submitChangePass() {
            const oldP = document.getElementById('oldPass').value.trim();
            const newP = document.getElementById('newPass').value.trim();
            
            if (!oldP || !newP) { alert("請填寫完整資訊"); return; }
            if (newP.length < 4) { alert("新密碼長度建議至少 4 位"); return; }
        
            try {
                const res = await fetch(`${gasUrl}?action=changePassword&token=${encodeURIComponent(token)}&oldPassword=${encodeURIComponent(oldP)}&newPassword=${encodeURIComponent(newP)}`);
                const data = await res.json();
                
                if (data.success) {
                    alert("密碼修改成功，請重新登入");
                    sessionStorage.clear();
                    window.location.href = 'index.html';
                } else {
                    alert(data.msg);
                }
            } catch (e) {
                alert("連線失敗，請稍後再試");
            }
        }

        init();
        setInterval(updateMarquee, 30000); // 30秒自動更新一次
    </script>
</body>
</html>
