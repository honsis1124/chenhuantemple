<!-- 在 gameContainer 內加入以下結構 -->
<div id="gameContainer" style="display:none; max-width: 500px; margin: auto;">
    
    <!-- 歷史跑馬燈 -->
    <div style="background: #333; color: #fff; padding: 5px; border-radius: 5px; margin-bottom: 10px;">
        <marquee id="historyBox">載入中動態中...</marquee>
    </div>

    <!-- 原有的扭蛋機代碼... (保留上一部分的 HTML) -->
    
    <!-- 個人中獎查詢 -->
    <div id="myPrizes" style="margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px;">
        <h3>我的中獎清單</h3>
        <ul id="prizeList" style="text-align: left; font-size: 14px;"></ul>
    </div>
</div>

<script>
    const gasUrl = "你的GAS網址";
    const username = "從登入資訊取得的用戶名"; // 建議登入時用 localStorage 存起來

    // 初始化：讀取歷史紀錄
    async function updateHistory() {
        const res = await fetch(`${gasUrl}?action=getLogs`);
        const data = await res.json();
        const marquee = data.history.map(h => `恭喜帳號 "${h.user}" 抽中 "${h.prize}"`).join(" | ");
        document.getElementById('historyBox').innerText = marquee;
    }

    // 抽獎邏輯修改
    async function startGacha() {
        // ... (保留搖晃動畫)
        
        try {
            const res = await fetch(`${gasUrl}?action=draw&username=${encodeURIComponent(username)}`);
            const data = await res.json();
            
            if (data.success) {
                // 顯示結果
                document.getElementById('prizeName').innerText = data.prizeName;
                document.getElementById('prizeCode').innerHTML = `序號：<b style="color:blue">${data.prizeCode}</b>`;
                document.getElementById('modal').style.display = 'block';
                updateHistory(); // 更新跑馬燈
            } else {
                alert(data.msg);
            }
        } catch (e) {
            alert("抽獎發生錯誤");
        }
    }
    
    setInterval(updateHistory, 30000); // 每 30 秒自動更新一次跑馬燈
    updateHistory();
</script>
