<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲主頁 - 晨皇廟咖啡</title>
    <style>
        :root { --primary: #ef233c; --dark: #2b2d42; --gold: #ffbe0b; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #fdf0d5; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .marquee-box { width: 100%; max-width: 400px; background: var(--dark); color: var(--gold); padding: 10px; border-radius: 50px; margin-bottom: 20px; text-align: center; overflow: hidden; white-space: nowrap; }
        
        .machine { width: 200px; height: 300px; background: var(--primary); border: 5px solid #333; border-radius: 20px; position: relative; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 10px 0 #b91d2e; }
        .machine:active { transform: translateY(5px); box-shadow: 0 5px 0 #b91d2e; }
        .machine::after { content: "點擊抽獎"; color: white; font-weight: bold; font-size: 20px; }

        .history-section { width: 100%; max-width: 400px; background: white; margin-top: 30px; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h3 { border-left: 5px solid var(--primary); padding-left: 10px; margin-top: 0; }
        ul { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; }
        li { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; border: 4px solid var(--primary); z-index: 100; text-align: center; width: 280px; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index: 90; }
    </style>
</head>
<body>

    <div class="marquee-box">
        <marquee id="globalMarquee">載入中...</marquee>
    </div>

    <h2 id="welcomeMsg">您好</h2>

    <div class="machine" onclick="handleDraw()"></div>

    <div class="history-section">
        <h3>🎁 我的獲獎紀錄</h3>
        <ul id="myList"><li>尚未有紀錄</li></ul>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="modal">
        <h2 id="pTitle">中獎了！</h2>
        <p id="pName" style="font-size: 20px; color: var(--primary); font-weight: bold;"></p>
        <p id="pCode" style="background: #eee; padding: 10px; word-break: break-all;"></p>
        <button onclick="closeModal()" style="padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer;">收下</button>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbytYoaERnyIdUrdXnjNJ1lyBAglEhagwYJw-W54OQsScCK3xUd1Eux8g-KMXGmFg3Ye/exec";
        const token = sessionStorage.getItem('token');
        const username = sessionStorage.getItem('username');
        const nickname = sessionStorage.getItem('nickname');

        if (!token) { window.location.href = 'index.html'; }
        document.getElementById('welcomeMsg').innerText = `您好，${nickname || username}`;

        async function init() {
            updateMarquee();
            updateMyHistory();
        }

        async function handleDraw() {
            try {
                const res = await fetch(`${gasUrl}?action=draw&token=${encodeURIComponent(token)}`);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('pName').innerText = data.prizeName;
                    document.getElementById('pCode').innerText = (data.prizeCode === "NONE") ? "再接再厲！" : "序號：" + data.prizeCode;
                    document.getElementById('modal').style.display = 'block';
                    document.getElementById('overlay').style.display = 'block';
                    init();
                } else {
                    alert(data.msg);
                }
            } catch (e) { alert("連線失敗"); }
        }

        async function updateMarquee() {
            try {
                const res = await fetch(`${gasUrl}?action=getLogs`);
                const data = await res.json();
                if (data.history) {
                    const text = data.history.map(h => `恭喜 [${h.nickname}] 獲得 ${h.prize}`).join(" 🌟 ");
                    document.getElementById('globalMarquee').innerText = text || "快來當第一個中獎者！";
                }
            } catch (e) {}
        }

        async function updateMyHistory() {
            try {
                const res = await fetch(`${gasUrl}?action=getLogs`);
                const data = await res.json();
                const list = document.getElementById('myList');
                // 前端過濾：只顯示自己的帳號對應的紀錄
                const myLogs = data.history.filter(h => h.username === username || h.nickname === nickname);
                if (myLogs.length > 0) {
                    list.innerHTML = myLogs.map(h => `<li><b>${h.prize}</b></li>`).join("");
                }
            } catch (e) {}
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        init();
        setInterval(updateMarquee, 30000); // 30秒自動更新一次
    </script>
</body>
</html>
