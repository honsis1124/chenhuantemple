<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 晨皇廟咖啡扭蛋機</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #fdf0d5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 320px; text-align: center; border: 4px solid #ef233c; }
        h2 { color: #ef233c; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ef233c; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
        #msg { margin-top: 15px; font-size: 14px; min-height: 1.2em; color: red; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🎁 晨皇廟咖啡</h2>
        <input type="text" id="user" placeholder="帳號">
        <input type="password" id="pass" placeholder="密碼">
        <button id="loginBtn" onclick="handleLogin()">進入遊戲</button>
        <p id="msg"></p>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbzmkqXRRvBHXV4jKNzn2lkzC7UreOwj2zgwnWDuTf8pfcdCtQhrBBxkbKUxN_vTBgWf/exec";

        async function handleLogin() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('loginBtn');

            if (!u || !p) { msg.innerText = "請輸入帳號密碼"; return; }

            btn.disabled = true;
            msg.style.color = "#555";
            msg.innerText = "驗證中...";

            try {
                const res = await fetch(`${gasUrl}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
                const data = await res.json();

                if (data.success) {
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.setItem('username', data.username);
                    sessionStorage.setItem('nickname', data.nickname); // 關鍵：儲存暱稱
                    msg.style.color = "green";
                    msg.innerText = "登入成功！";
                    setTimeout(() => window.location.href = 'game.html', 500);
                } else {
                    msg.style.color = "red";
                    msg.innerText = data.msg || "登入失敗";
                    btn.disabled = false;
                }
            } catch (e) {
                msg.innerText = "系統連線失敗";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
