<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晨皇廟咖啡扭蛋機</title>
    <style>
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background: #fdf0d5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%;
            max-width: 350px; 
            text-align: center;
            border: 4px solid #ef233c;
        }
        h2 { color: #ef233c; margin-bottom: 1.5rem; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus {
            border-color: #ef233c;
            outline: none;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #ef233c; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px;
            font-weight: bold;
            cursor: pointer; 
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover { background: #d90429; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        #msg { 
            margin-top: 15px; 
            font-size: 14px; 
            min-height: 1.2em;
        }

        .loading-dots:after {
            content: ' .';
            animation: dots 1s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ' .'; }
            40% { content: ' . .'; }
            60% { content: ' . . .'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h2>🎁 晨皇廟咖啡扭蛋機</h2>

        <input 
            type="text" 
            id="user" 
            placeholder="請輸入帳號"
            autocomplete="username"
        >

        <input 
            type="password" 
            id="pass" 
            placeholder="請輸入密碼"
            autocomplete="current-password"
        >

        <button id="loginBtn" onclick="handleLogin()">
            進入遊戲
        </button>

        <p id="msg"></p>
    </div>

    <script>

        // ⭐ GAS Web App URL
        const gasUrl = "https://script.google.com/macros/s/AKfycbxuOvhzvasjT-nTIhXc-JtxLR125Y3RUI0aXrM5zVF08Z4nrn4DFAPzm9okhutekW4/exec";

        // ⭐ 防止重複登入
        let isLoggingIn = false;

        // ⭐ 如果已登入，自動進遊戲
        if (
            sessionStorage.getItem('loginToken') &&
            sessionStorage.getItem('username')
        ) {
            window.location.href = "game.html";
        }

        async function handleLogin() {

            // ⭐ 防止狂點
            if (isLoggingIn) return;

            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value.trim();

            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');

            // ⭐ 清除舊 session
            sessionStorage.clear();

            // ===== 基本驗證 =====

            if (!user || !pass) {
                msg.style.color = "orange";
                msg.innerText = "請填寫帳號與密碼";
                return;
            }

            // ===== 進入登入狀態 =====

            isLoggingIn = true;

            btn.disabled = true;

            msg.style.color = "#555";
            msg.innerHTML = '<span class="loading-dots">驗證身分中</span>';

            // ⭐ 建立請求 URL
            const requestUrl =
                `${gasUrl}?action=login`
                + `&username=${encodeURIComponent(user)}`
                + `&password=${encodeURIComponent(pass)}`;

            try {

                const response = await fetch(requestUrl);

                // ⭐ HTTP 錯誤
                if (!response.ok) {
                    throw new Error("HTTP ERROR");
                }

                const data = await response.json();

                // ===== 登入成功 =====

                if (data.success && data.token) {

                    // ⭐ 儲存 Token
                    sessionStorage.setItem('loginToken', data.token);

                    // ⭐ 儲存帳號
                    sessionStorage.setItem('username', user);

                    msg.style.color = "green";
                    msg.innerText = "登入成功！跳轉中...";

                    setTimeout(() => {
                        window.location.href = 'game.html';
                    }, 800);

                } else {

                    // ===== 登入失敗 =====

                    sessionStorage.clear();

                    msg.style.color = "red";
                    msg.innerText = "帳號或密碼錯誤";

                    btn.disabled = false;
                    isLoggingIn = false;
                }

            } catch (e) {

                console.error("Login Error:", e);

                sessionStorage.clear();

                msg.style.color = "red";
                msg.innerText = "系統連線失敗";

                btn.disabled = false;
                isLoggingIn = false;
            }
        }

        // ⭐ Enter 登入
        document.addEventListener('keypress', function (e) {

            if (e.key === 'Enter') {
                handleLogin();
            }

        });

    </script>

</body>
</html>
